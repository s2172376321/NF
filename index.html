<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>網路菜車｜線上訂購</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(160deg,#f4f7f0 0%,#e8efe4 50%,#f0ebe3 100%);
         font-family:'Segoe UI','Microsoft JhengHei',sans-serif;padding:24px;box-sizing:border-box;}
    .card{max-width:420px;width:100%;background:#fff;border-radius:20px;padding:40px 32px;
          box-shadow:0 12px 40px rgba(45,74,62,.12);text-align:center;}
    h1{font-size:1.5rem;color:#2d4a3e;margin:0 0 8px;font-weight:600;letter-spacing:.05em;}
    p{font-size:.9rem;color:#64748b;margin:0 0 28px;line-height:1.5;}
    .btn{display:block;width:100%;padding:20px 16px;font-size:1.15rem;font-weight:600;color:#fff;text-decoration:none;
         border-radius:14px;border:none;cursor:pointer;
         background:linear-gradient(90deg,#531dab 0%,#c41d7f 100%);
         box-shadow:0 6px 20px rgba(83,29,171,.25);transition:transform .15s,box-shadow .15s;}
    .btn:hover,.btn:focus{transform:translateY(-2px);box-shadow:0 10px 28px rgba(83,29,171,.3);outline:none;}
    .hint{margin-top:20px;font-size:.75rem;color:#94a3b8;}
  </style>
</head>
<body>
  <div class="card">
    <h1>網路菜車</h1>
    <p>每日上架新鮮品項，線上預訂、方便取貨。</p>
    <a class="btn" id="linkPort3000" href="#" target="_blank" rel="noopener">進入網路菜車</a>
    <p class="hint">若無法開啟，請稍後再試或洽店家人員。</p>
  </div>
  <script>
  /**
   * 與採收專案自動推送一致（github_tunnel_push.py / GITHUB_TUNNEL_AUTO_PUSH）
   * 本機：D:\網路菜車（npm run dev）；隧道：current-tunnel-3000.url
   *
   * 緊急覆寫（免重新部署）：在網址後加查詢參數，優先於下方常數
   *   ?p3000=https://xxxx.trycloudflare.com
   *   或 ?tunnel= 同上（僅允許 HTTPS 且為 trycloudflare / 常見 ngrok 網域）
   */
  const API_HOST_PORT3000 = 'https://funk-projects-saturn-reported.trycloudflare.com';

  function _allowedTunnelUrl(s) {
    if (!s || typeof s !== 'string') return false;
    try {
      var u = new URL(s.trim());
      if (u.protocol !== 'https:') return false;
      var h = (u.hostname || '').toLowerCase();
      if (h.endsWith('.trycloudflare.com')) return true;
      if (h.indexOf('ngrok') !== -1 && (
            h.endsWith('.ngrok-free.app') || h.endsWith('.ngrok.io') || h.endsWith('.ngrok.app')))
        return true;
      return false;
    } catch (e) {
      return false;
    }
  }

  (function(){
    var el = document.getElementById('linkPort3000');
    if (!el) return;
    var qs = new URLSearchParams(window.location.search || '');
    var fromQuery = (qs.get('p3000') || qs.get('tunnel') || '').trim();
    var fromConst = (typeof API_HOST_PORT3000 === 'string' ? API_HOST_PORT3000.trim() : '');
    var u = '';
    if (_allowedTunnelUrl(fromQuery)) {
      u = fromQuery.replace(/\/+$/, '');
    } else if (fromConst && /^https?:\/\//i.test(fromConst) && fromConst.indexOf('請貼上') === -1) {
      u = fromConst.replace(/\/+$/, '');
    }
    if (u) {
      el.href = u;
    } else {
      el.addEventListener('click', function(e){
        e.preventDefault();
        alert('入口網址尚未設定，請稍後再試。');
      });
    }
  })();
  </script>
</body>
</html>
