<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>今日營運總表｜入口</title>
  <!--
    【複製到 NF 倉庫根目錄】檔名：daily_ops_summary.html
    固定網址：https://s2172376321.github.io/NF/daily_ops_summary.html
  -->
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(165deg,#f7f5f0 0%,#efeae2 50%,#f5f2ec 100%);
         font-family:'Segoe UI','Microsoft JhengHei','Noto Sans TC',sans-serif;padding:24px;box-sizing:border-box;}
    .card{max-width:440px;width:100%;background:#fffcf7;border:1px solid #e7e2d9;border-radius:4px;padding:40px 32px;
          box-shadow:0 16px 48px rgba(28,25,23,.06);text-align:center;}
    h1{font-family:Georgia,'Times New Roman',serif;font-size:1.35rem;font-weight:600;color:#1c1917;margin:0 0 10px;letter-spacing:.12em;}
    p{font-size:.88rem;color:#78716c;margin:0 0 20px;line-height:1.65;font-weight:300;}
    .btn{display:inline-block;padding:14px 28px;font-size:.95rem;font-weight:600;color:#fff;text-decoration:none;
         border-radius:3px;border:1px solid #7c6a58;background:#7c6a58;letter-spacing:.08em;
         transition:background .2s,border-color .2s,transform .15s;}
    .btn:hover,.btn:focus{background:#5c4d3f;border-color:#5c4d3f;transform:translateY(-1px);outline:none;}
    .hint{margin-top:22px;font-size:.72rem;color:#a8a29e;line-height:1.5;}
  </style>
  <script>
  const API_HOST = 'https://swaziland-packets-stick-nations.trycloudflare.com';
  const API_HOST_PORT3000 = 'https://guam-municipality-vary-buried.trycloudflare.com';

  function _allowedTunnelUrl(s) {
    if (!s || typeof s !== 'string') return false;
    try {
      var u = new URL(s.trim());
      if (u.protocol !== 'https:') return false;
      var h = (u.hostname || '').toLowerCase();
      if (h.endsWith('.trycloudflare.com')) return true;
      if (h.indexOf('ngrok') !== -1 && (
            h.endsWith('.ngrok-free.app') || h.endsWith('.ngrok.io') || h.endsWith('.ngrok.app')))
        return true;
      return false;
    } catch (e) {
      return false;
    }
  }

  var TARGET_URL = '';
  (function(){
    var qs = new URLSearchParams(window.location.search || '');
    var fromQuery = (qs.get('host') || qs.get('api') || '').trim();
    var base = '';
    if (_allowedTunnelUrl(fromQuery)) {
      base = fromQuery.replace(/\/+$/, '');
    } else {
      var raw = (typeof API_HOST === 'string' ? API_HOST.trim() : '');
      if (raw && /^https?:\/\//i.test(raw) && raw.indexOf('請貼上') === -1) {
        base = raw.replace(/\/+$/, '');
      }
    }
    TARGET_URL = base ? (base + '/daily_ops_summary') : '';
  })();
  </script>
  <script>
  (function(){
    if (!TARGET_URL) return;
    try {
      var m = document.createElement('meta');
      m.setAttribute('http-equiv', 'refresh');
      m.setAttribute('content', '0;url=' + TARGET_URL);
      document.head.appendChild(m);
      window.location.replace(TARGET_URL);
    } catch (e) {}
  })();
  </script>
</head>
<body>
  <div class="card">
    <h1>今日營運總表</h1>
    <p>正在前往農場小工具（蛋雞舍巡檢 · 洗蛋 · 出貨）…</p>
    <a id="manual" class="btn" href="#">手動開啟</a>
    <p class="hint">若無法開啟，請稍後再試、確認採收主機隧道已啟動，或洽資訊人員。<br>
    臨時網址：<code style="font-size:0.68rem;">?host=https://…trycloudflare.com</code></p>
  </div>
  <script>
  (function(){
    var a = document.getElementById('manual');
    if (a && TARGET_URL) a.href = TARGET_URL;
    else if (a) {
      a.addEventListener('click', function(e){
        e.preventDefault();
        alert('入口網址尚未設定，請稍後再試。');
      });
    }
  })();
  </script>
</body>
</html>
