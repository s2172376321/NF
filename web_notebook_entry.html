<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>群組記事本入口</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f3f5f7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif}
    .card{width:min(92vw,680px);background:#fff;border-radius:16px;padding:28px;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}
    h1{margin:0 0 10px;font-size:1.5rem}
    p{margin:0 0 18px;color:#666}
    .btn{display:inline-block;width:100%;padding:16px 20px;border-radius:12px;text-decoration:none;color:#fff;font-weight:700;background:linear-gradient(90deg,#1677ff 0%,#36a2ff 100%)}
    .url{margin-top:12px;font-size:.88rem;color:#666;word-break:break-all}
  </style>
</head>
<body>
  <main class="card">
    <h1>群組記事本入口</h1>
    <p>沒有 Telegram 帳號也可透過此按鈕查看聊天室網頁。</p>
    <a class="btn" href="https://demo-pushed-link.trycloudflare.com" target="_blank" rel="noopener noreferrer">開啟免費外網連結</a>
    <div class="url">https://demo-pushed-link.trycloudflare.com</div>
  </main>
</body>
</html>
