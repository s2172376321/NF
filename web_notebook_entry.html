<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>群組記事本入口</title>
  <style>
    body{margin:0;min-height:100vh;font-family:-apple-system,Segoe UI,Roboto,Noto Sans TC,sans-serif;
    background:linear-gradient(160deg,#f4f7f0 0%,#e8efe4 50%,#f0ebe3 100%);
    padding:max(24px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(24px,env(safe-area-inset-bottom)) max(20px,env(safe-area-inset-left));
    box-sizing:border-box;display:flex;align-items:center;justify-content:center;}
    .card{max-width:min(400px,100%);width:100%;margin:0 auto;background:#fff;border-radius:16px;padding:22px 18px 20px;
    box-shadow:0 8px 28px rgba(45,74,62,.1);text-align:center;}
    h1{font-size:1.2rem;color:#2d4a3e;margin:0 0 18px;font-weight:600;letter-spacing:.02em;}
    .btn{display:block;max-width:280px;width:100%;margin:0 auto;padding:14px 16px;font-size:.98rem;font-weight:600;color:#fff;text-decoration:none;
    border-radius:12px;background:linear-gradient(90deg,#1677ff,#36a2ff);
    box-shadow:0 4px 16px rgba(22,119,255,.2);}
    .btn:hover,.btn:focus{filter:brightness(1.05);outline:none;}
    .url{max-width:100%;margin:14px auto 0;font-size:.78rem;color:#64748b;word-break:break-all;line-height:1.5;}
  </style>
</head>
<body>
  <div class="card">
    <h1>群組記事本入口</h1>
    <a id="linkPort8001" class="btn" href="#">進入群組記事本</a>
    <div class="url" id="tunnelUrl">載入中…</div>
  </div>

  <script>
    /**
     * 與「網路菜車」相同方式：
     * 緊急覆寫（免重新部署）：?p8001=https://xxxx.trycloudflare.com/start
     * 或 ?tunnel= 同上
     */
    const CHAT_ID = -5186917090;
    const API_HOST_PORT8001 = "https://adam-integrity-significant-separation.trycloudflare.com/?chat_id=-5186917090";
    const ENTRY_STATUS_BASES = ["https://adam-integrity-significant-separation.trycloudflare.com/?chat_id=-5186917090"];

    function toChatRoomUrl(u) {
      if (!u) return "";
      if (!CHAT_ID) return u.replace(/\/+$/, "");
      try {
        const x = new URL(u.trim());
        const path = (x.pathname || "/").replace(/\/+$/, "") || "/";
        const has = x.searchParams.has("chat_id");
        if (path !== "/" && path !== "/start" && !has) return u.replace(/\/+$/, "");
        const o = new URL(x.origin + "/");
        o.searchParams.set("chat_id", String(CHAT_ID));
        return o.toString().replace(/\/+$/, "");
      } catch (e) {
        return u.replace(/\/+$/, "");
      }
    }

    function _allowedTunnelUrl(s) {
      if (!s || typeof s !== 'string') return false;
      try {
        const u = new URL(s.trim());
        if (u.protocol !== 'https:') return false;
        const h = (u.hostname || '').toLowerCase();
        if (h.endsWith('.trycloudflare.com')) return true;
        if (h.includes('ngrok') && (
          h.endsWith('.ngrok-free.app') || h.endsWith('.ngrok.io') || h.endsWith('.ngrok.app')
        )) return true;
        return false;
      } catch (e) {
        return false;
      }
    }

    function _originOf(u) {
      try { return new URL(u.trim()).origin; } catch (e) { return ""; }
    }

    (function(){
      const linkEl = document.getElementById('linkPort8001');
      const urlEl = document.getElementById('tunnelUrl');
      if (!linkEl || !urlEl) return;
      const qs = new URLSearchParams(window.location.search || '');
      const fromQuery = (qs.get('p8001') || qs.get('tunnel') || '').trim().replace(/\/+$/, '');
      const tryList = [];
      if (fromQuery && _allowedTunnelUrl(fromQuery)) {
        tryList.push(fromQuery);
      }
      ENTRY_STATUS_BASES.forEach(function (u) {
        var t = String(u || '').trim().replace(/\/+$/, '');
        if (!t || tryList.indexOf(t) >= 0) return;
        tryList.push(t);
      });

      function apply(raw) {
        const room = toChatRoomUrl(raw);
        if (room) {
          linkEl.href = room;
          urlEl.textContent = room;
        } else {
          linkEl.addEventListener('click', function(e){
            e.preventDefault();
            alert('入口網址尚未設定，請稍後再試。');
          });
          urlEl.textContent = '尚未設定外網連結';
        }
      }

      if (!tryList.length) {
        apply('');
        return;
      }
      function tryStatusFetch(idx) {
        if (idx >= tryList.length) {
          apply(tryList[0]);
          return;
        }
        var cand = tryList[idx];
        var o = _originOf(cand);
        if (!o) {
          tryStatusFetch(idx + 1);
          return;
        }
        fetch(o + '/api/tunnel/status', { method: 'GET', mode: 'cors', cache: 'no-store' })
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (d && d.url) {
              apply(d.url);
              return;
            }
            tryStatusFetch(idx + 1);
          })
          .catch(function () { tryStatusFetch(idx + 1); });
      }
      tryStatusFetch(0);
    })();
  </script>
</body>
</html>
